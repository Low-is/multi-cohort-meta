# -----------------------
# DNA ARCHIVE SEARCH
# -----------------------
dna_archive_search:
  database: gds
  retmax: 500
  query: >
    (sepsis OR Sepsis) AND
    ("Expression profiling by array" OR microarray OR "gene expression profiling") AND
    Homo sapiens[Organism] AND
    (neonate OR newborn OR infant OR preterm OR premature OR "extremely low gestational age")

# -----------------------
# RNA ARCHIVE SEARCH
# -----------------------
rna_archive_search:
  database: gds
  retmax: 500
  query: >
    (sepsis OR Sepsis) AND
    (RNA-seq OR RNAseq OR "Expression profiling by high throughput sequencing") AND
    Homo sapiens[Organism] AND
    (neonate OR newborn OR infant OR preterm OR premature OR "extremely low gestational age")

# -----------------------
# DNA WEEKLY SEARCH
# -----------------------
dna_weekly_search:
  database: gds
  retmax: 500
  reldate: 730
  query: >
    (sepsis OR Sepsis) AND
    ("Expression profiling by array" OR microarray OR "gene expression profiling") AND
    Homo sapiens[Organism] AND
    (neonate OR newborn OR infant OR preterm OR premature OR "extremely low gestational age")

# -----------------------
# RNA WEEKLY SEARCH
# -----------------------
rna_weekly_search:
  database: gds
  retmax: 500
  reldate: 730
  query: >
    (sepsis OR Sepsis) AND
    (RNA-seq OR RNAseq OR "Expression profiling by high throughput sequencing") AND
    Homo sapiens[Organism] AND
    (neonate OR newborn OR infant OR preterm OR premature OR "extremely low gestational age")


# -----------------------
# DNA KEYS
# -----------------------
dna_keys:
  - "expression profiling by array"
  - affymetrix
  - agilent

# -----------------------
# RNA KEYS
# -----------------------
rna_keys:
  - "expression profiling by high throughput sequencing"
  - "rna seq"
  - "rna sequencing"
  
# -----------------------
# EXCLUDE KEYS
# -----------------------
exclude_keys:
  - other
  - methylation
